<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ely & Lucian's Duo Highscores</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/x-icon" href="/images/osrs_head.ico">
        <meta name="description" content="Duo Ely &amp; Duo Lucian's Old School RuneScape Group Ironman Highscores">
    </head>

    <body>
        <header>
            <a href="https://secure.runescape.com/m=hiscore_oldschool_ironman/group-ironman/?groupName=Castle+Duo" id="title-link" target="_blank" rel="noopener noreferrer">
                <img src="images/head_ely.png" alt="Ely" class="header-head head-ely">
                <h1>Ely & Lucian's Duo Highscores</h1>
                <img src="images/head_lucian.png" alt="Lucian" class="header-head">
            </a>
            <div id="group-rank">Castle Duo Rank: Loading...</div>
        </header>

        <div id="error-message" class="error-message" style="display:none;">
        </div>

        <div class="rank-chart-wrapper">
            <h2 class="rank-chart-title">Group Rank<br>History</h2>
            <div class="rank-chart-canvas-wrap">
                <canvas id="rank-chart"></canvas>
                <div id="rank-chart-empty" class="rank-chart-empty">No rank history yet — check back tomorrow!</div>
            </div>
        </div>

        <div class="highscores-container">
            <div class="table-wrapper">
                <h2 id="user-title">Duo Ely</h2>
                <div id="user-hiscores-table">Loading...</div>
            </div>

            <div class="table-wrapper">
                <h2 id="friend-title">Duo Lucian</h2>
                <div id="friend-hiscores-table">Loading...</div>
            </div>

            <div class="table-wrapper task-wrapper">
                <h2>To-Do List</h2>
                <div class="task-input-row">
                    <input type="text" id="task-input" class="task-input" placeholder="Add a task..." maxlength="120">
                    <button id="task-add-btn" class="task-add-btn" aria-label="Add task">+</button>
                </div>
                <div class="task-assignee-row">
                    <span class="task-assignee-label">For:</span>
                    <button class="task-face-btn" id="assignee-ely" data-player="ely" aria-label="Assign to Ely" aria-pressed="false">
                        <img src="images/head_ely.png" alt="Ely">
                    </button>
                    <button class="task-face-btn" id="assignee-lucian" data-player="lucian" aria-label="Assign to Lucian" aria-pressed="false">
                        <img src="images/head_lucian.png" alt="Lucian">
                    </button>
                    <span class="task-assignee-label" style="margin-left:8px;">Icon:</span>
                    <div class="task-skill-picker-wrap">
                        <button id="task-skill-btn" class="task-skill-btn" aria-label="Pick skill icon" title="Pick a skill">
                            <span id="task-skill-btn-inner">?</span>
                        </button>
                        <div id="task-skill-popup" class="task-skill-popup" style="display:none;">
                            <div class="task-skill-popup-grid" id="task-skill-grid"></div>
                        </div>
                    </div>
                </div>
                <ul id="task-list" class="task-list"></ul>
                <div id="task-empty" class="task-empty">No tasks yet. Add one above!</div>
            </div>
        </div>
        <script src="app.js" type="module"></script>
    </body>

</html>
