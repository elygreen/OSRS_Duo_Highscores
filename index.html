<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ely & Lucian's Duo Highscores</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/x-icon" href="/images/osrs_head.ico">
        <meta name="description" content="Duo Ely &amp; Duo Lucian's Old School RuneScape Group Ironman Highscores">
    </head>

    <body>
        <header>
            <a href="https://secure.runescape.com/m=hiscore_oldschool_ironman/group-ironman/?groupName=Castle+Duo" id="title-link" target="_blank" rel="noopener noreferrer">
                <img src="images/head_ely.png" alt="Ely" class="header-head head-ely">
                <h1>Ely & Lucian's Duo Highscores</h1>
                <img src="images/head_lucian.png" alt="Lucian" class="header-head">
            </a>
            <div id="group-rank">Castle Duo Rank: Loading...</div>
        </header>

        <div id="error-message" class="error-message" style="display:none;">
        </div>

        <div class="highscores-container">
            <div class="table-wrapper">
                <h2 id="user-title">Duo Ely</h2>
                <div id="user-hiscores-table">Loading...</div>
            </div>

            <div class="table-wrapper">
                <h2 id="friend-title">Duo Lucian</h2>
                <div id="friend-hiscores-table">Loading...</div>
            </div>
        </div>
        <script src="app.js"></script>
    </body>

</html>
